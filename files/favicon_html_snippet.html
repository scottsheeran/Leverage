<!--
  LVRGE FAVICON SETUP — paste these tags inside the <head> section of your index.html
  Make sure all favicon files are uploaded to the root of your site (same level as index.html)
-->

<!-- Standard favicon (legacy + modern browsers) -->
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">

<!-- iOS home screen icon -->
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<!-- Android / PWA -->
<link rel="manifest" href="/site.webmanifest">

<!-- Theme color (for mobile browser chrome) -->
<meta name="theme-color" content="#0a0a0a">
